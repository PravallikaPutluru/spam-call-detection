<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Call Detector - PhoneGuard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .input-section {
            grid-column: span 2;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input[type="tel"], input[type="text"], select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .results {
            grid-column: span 2;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .risk-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .risk-low { background: rgba(46, 204, 113, 0.8); }
        .risk-medium { background: rgba(241, 196, 15, 0.8); }
        .risk-high { background: rgba(231, 76, 60, 0.8); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .input-section {
                grid-column: span 1;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }

        .loading {
            display: none;
            text-align: center;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .clear-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📞 PhoneGuard</h1>
            <p>Advanced Spam Call Detection & Number Analysis</p>
        </div>

        <div class="main-grid">
            <div class="card input-section">
                <h2 style="margin-bottom: 20px; color: #333;">🔍 Check Phone Number</h2>
                <div class="input-group">
                    <label for="phoneInput">Phone Number</label>
                    <input type="tel" id="phoneInput" placeholder="+1 (555) 123-4567" maxlength="20">
                </div>
                <div class="input-group">
                    <label for="carrier">Carrier (Optional)</label>
                    <select id="carrier">
                        <option value="">Auto-detect</option>
                        <option value="verizon">Verizon</option>
                        <option value="att">AT&T</option>
                        <option value="tmobile">T-Mobile</option>
                        <option value="sprint">Sprint</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <button class="btn" onclick="analyzeNumber()">🚀 Analyze Number</button>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Analyzing number...</p>
                </div>
            </div>

            <div class="card results" id="results" style="display: none;">
                <h2 style="margin-bottom: 20px; color: white;">📊 Analysis Results</h2>
                <div id="resultContent"></div>
                <button class="clear-btn" onclick="clearResults()" style="margin-top: 15px;">Clear Results</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalChecks">0</div>
                <div>Total Checks</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="spamFound">0</div>
                <div>Spam Detected</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="safeCalls">0</div>
                <div>Safe Numbers</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgRisk">0%</div>
                <div>Avg Risk Score</div>
            </div>
        </div>

        <div class="card" style="margin-top: 40px;">
            <h2 style="margin-bottom: 20px; color: #333;">📋 Recent Checks</h2>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        // Mock spam database (in real app, this would be an API)
        const spamDatabase = {
            patterns: [
                { pattern: /\b(?:800|888|877|866|855|844|833)\b/, risk: 40, reason: 'Toll-free numbers often used for spam' },
                { pattern: /\b(?:900|976)\b/, risk: 95, reason: 'Premium rate numbers (high scam risk)' },
                { pattern: /\b1[0-9]{9}\b/, risk: 25, reason: 'VOIP numbers commonly used for spam' },
                { pattern: /\b555\d{4}\b/, risk: 80, reason: 'Test/fake numbers' },
            ],
            knownSpammers: [
                '+15551234567', '+18001234567', '+18881234567', '+12345678901'
            ],
            carriers: {
                'verizon': { risk: 10 },
                'att': { risk: 12 },
                'tmobile': { risk: 15 },
                'sprint': { risk: 14 }
            }
        };

        let checkHistory = JSON.parse(localStorage.getItem('phoneguard_history')) || [];
        let totalStats = JSON.parse(localStorage.getItem('phoneguard_stats')) || {
            total: 0, spam: 0, safe: 0, avgRisk: 0
        };

        // Initialize UI
        updateStats();
        updateHistory();

        function analyzeNumber() {
            const phoneInput = document.getElementById('phoneInput').value.trim();
            if (!phoneInput) {
                alert('Please enter a phone number');
                return;
            }

            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const btn = event.target;

            // Show loading
            btn.disabled = true;
            loading.style.display = 'block';
            results.style.display = 'block';

            // Simulate API delay
            setTimeout(() => {
                const analysis = performAnalysis(phoneInput);
                displayResults(phoneInput, analysis);
                updateHistory(phoneInput, analysis);
                updateStats(analysis);
                
                btn.disabled = false;
                loading.style.display = 'none';
            }, 1500 + Math.random() * 1000);
        }

        function performAnalysis(phone) {
            const cleanPhone = phone.replace(/[\s\-\$\$]/g, '');
            let riskScore = 0;
            let reasons = [];
            let checks = [];

            // Check against known spammers
            if (spamDatabase.knownSpammers.some(spam => spam.includes(cleanPhone))) {
                riskScore += 90;
                reasons.push('Known spam number');
                checks.push('🛑 Known spammer');
            }

            // Pattern matching
            spamDatabase.patterns.forEach(({ pattern, risk, reason }) => {
                if (pattern.test(cleanPhone)) {
                    riskScore += risk;
                    reasons.push(reason);
                    checks.push('⚠️ Pattern match');
                }
            });

            // Carrier analysis
            const carrierSelect = document.getElementById('carrier').value;
            if (carrierSelect && spamDatabase.carriers[carrierSelect]) {
                riskScore += spamDatabase.carriers[carrierSelect].risk;
                checks.push('📡 Carrier verified');
            }

            // Sequential digits check
            if (/(\d)\1{4,}/.test(cleanPhone)) {
                riskScore += 30;
                reasons.push('Sequential/repetitive digits');
                checks.push('🔢 Repetitive pattern');
            }

            // Area code reputation (mock)
            const areaCode = cleanPhone.match(/^(\d{3})/)?.[1];
            if (areaCode && ['555', '000', '999'].includes(areaCode)) {
                riskScore += 70;
                reasons.push('Suspicious area code');
                checks.push('📍 Bad area code');
            }

            // Normalize risk score
            riskScore = Math.min(riskScore, 100);

            const riskLevel = riskScore > 70 ? 'HIGH' : riskScore > 40 ? 'MEDIUM' : 'LOW';

            return {
                riskScore: Math.round(riskScore),
                riskLevel,
                reasons,
                checks,
                isSpam: riskScore > 50,
                timestamp: new Date().toLocaleString()
            };
        }

        function displayResults(phone, analysis) {
            const resultContent = document.getElementById('resultContent');
            
            const riskClass = `risk-${analysis.riskLevel.toLowerCase()}`;
            const riskText = analysis.riskLevel === 'HIGH' ? '🚨 HIGH RISK' : 
                           analysis.riskLevel === 'MEDIUM' ? '⚠️ MEDIUM RISK' : '✅ LOW RISK';

            resultContent.innerHTML = `
                <div class="result-item">
                    <span>📱 Number</span>
                    <strong>${phone}</strong>
                </div>
                <div class="result-item">
                    <span>🎯 Risk Score</span>
                    <div>
                        <span class="risk-badge ${riskClass}">${analysis.riskScore}%</span>
                        <span style="margin-left: 10px;">${riskText}</span>
                    </div>
                </div>
                <div class="result-item">
                    <span>🔍 Checks Performed</span>
                    <div>${analysis.checks.join(' • ')}</div>
                </div>
                ${analysis.reasons.length ? `
                <div class="result-item">
                    <span>❌ Risk Factors</span>
                    <div>${analysis.reasons.join('<br>')}</div>
                </div>
                ` : ''}
                <div class="result-item">
                    <span>📅 Analyzed</span>
                    <strong>${analysis.timestamp}</strong>
                </div>
            `;
        }

        function updateHistory(phone, analysis) {
            const entry = {
                phone,
                riskScore: analysis.riskScore,
                timestamp: analysis.timestamp,
                isSpam: analysis.isSpam
            };

            checkHistory.unshift(entry);
            checkHistory = checkHistory.slice(0, 50); // Keep last 50
            localStorage.setItem('phoneguard_history', JSON.stringify(checkHistory));
            updateHistoryUI();
        }

        function updateHistoryUI() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = checkHistory.map(entry => `
                <div class="history-item">
                    <span>${entry.phone}</span>
                    <div>
                        <span class="risk-badge risk-${entry.riskScore > 70 ? 'high' : entry.riskScore > 40 ? 'medium' : 'low'}">
                            ${entry.riskScore}%
                        </span>
                        <small style="margin-left: 10px;">${new Date(entry.timestamp).toLocaleTimeString()}</small>
                    </div>
                </div>
            `).join('');
        }

        function updateStats(analysis = null) {
            if (analysis) {
                totalStats.total++;
                if (analysis.isSpam) totalStats.spam++;
                else totalStats.safe++;
                totalStats.avgRisk = ((totalStats.avgRisk * (totalStats.total - 1)) + analysis.riskScore) / totalStats.total;
                localStorage.setItem('phoneguard_stats', JSON.stringify(totalStats));
            }

            document.getElementById('totalChecks').textContent = totalStats.total;
            document.getElementById('spamFound').textContent = totalStats.spam;
            document.getElementById('safeCalls').textContent = totalStats.safe;
            document.getElementById('avgRisk').textContent = Math.round(totalStats.avgRisk) + '%';
        }

        function clearResults() {
            document.getElementById('results').style.display = 'none';
            document.getElementById('phoneInput').value = '';
            document.getElementById('phoneInput').focus();
        }

        // Auto-format phone number
        document.getElementById('phoneInput').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.startsWith('1')) value = value.slice(1);
            
            if (value.length >= 6) {
                value = value.replace(/(\d{3})(\d{3})(\d{4})/, '($1) $2-$3');
            } else if (value.length >= 3) {
                value = value.replace(/(\d{3})(\d{0,3})/, '($1) $2');
            }
            e.target.value = value;
        });

        // Enter key support
        document.getElementById('phoneInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzeNumber();
            }
        });

        // Load history on page load
        updateHistoryUI();
    </script>
</body>
</html>
